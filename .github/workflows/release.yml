name: Release

# Builds FoldGen for all supported platforms and attaches the binaries to a
# GitHub Release. Trigger by pushing a tag like `v1.0.0`, or run manually
# (workflow_dispatch) to get the binaries as workflow artifacts.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Universal — Intel + Apple Silicon)
            os: macos-latest
            platform: darwin/universal
            output: FoldGen-macos-universal.zip
          - name: Windows x64
            os: windows-latest
            platform: windows/amd64
            output: FoldGen-windows-amd64.exe
          - name: Windows ARM64
            os: windows-latest
            platform: windows/arm64
            output: FoldGen-windows-arm64.exe
          - name: Linux x64
            os: ubuntu-22.04
            platform: linux/amd64
            output: FoldGen-linux-amd64
          - name: Linux ARM64
            os: ubuntu-22.04-arm
            platform: linux/arm64
            output: FoldGen-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == linux/* ]]; then
            wails build -platform ${{ matrix.platform }} -clean -tags webkit2_41
          else
            wails build -platform ${{ matrix.platform }} -clean
          fi

      - name: Package output
        shell: bash
        run: |
          cd build/bin
          if [[ "${{ matrix.platform }}" == darwin/* ]]; then
            zip -r "../../${{ matrix.output }}" FoldGen.app
          elif [[ "${{ matrix.platform }}" == windows/* ]]; then
            mv FoldGen.exe "../../${{ matrix.output }}"
          else
            mv FoldGen "../../${{ matrix.output }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.output }}
